<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanchith OS</title>

<style>
body{
 margin:0;
 background:black;
 color:#00eaff;
 font-family:Arial;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 height:100vh;
}

/* clock */
#time{
 font-size:60px;
 margin-bottom:10px;
}

/* swipe */
.swipe{
 width:80%;
 height:50px;
 border:1px solid #00eaff;
 border-radius:30px;
 position:relative;
 margin:20px 0;
}

.slider{
 width:50px;
 height:50px;
 background:#00eaff;
 border-radius:50%;
 position:absolute;
 left:0;
 top:0;
}

/* inputs */
input{
 display:block;
 margin:8px;
 padding:10px;
 width:200px;
 background:black;
 border:1px solid #00eaff;
 color:#00eaff;
}
button{
 padding:10px;
 background:black;
 border:1px solid #00eaff;
 color:#00eaff;
}
</style>
</head>

<body>

<div id="time"></div>

<div class="swipe">
  <div class="slider" id="slider"></div>
</div>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Unlock</button>

<script>
setInterval(()=>{
 let d=new Date();
 time.innerHTML=d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
},1000);

/* swipe */
let slider=document.getElementById("slider");
let dragging=false;

slider.addEventListener("mousedown",()=>dragging=true);
document.addEventListener("mouseup",()=>dragging=false);

document.addEventListener("mousemove",(e)=>{
 if(dragging){
   let x=e.clientX;
   if(x>150) unlock();
 }
});

function unlock(){
 window.location="home.html";
}

function login(){
 if(user.value==="admin" && pass.value==="AI123"){
   unlock();
 } else alert("Wrong password");
}
</script>

</body>
</html>
