<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:#00eaff;
}

.time{
  font-size:40px;
  padding:20px;
}

.apps{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:20px;
}

.app{
  background:rgba(0,0,0,0.6);
  border:1px solid #00eaff;
  border-radius:20px;
  text-align:center;
  padding:20px;
  box-shadow:0 0 15px #00eaff;
  cursor:pointer;
}

.app i{
  font-size:30px;
  margin-bottom:5px;
}
</style>
</head>

<body>

<div class="time" id="time"></div>

<div class="apps">
  <div class="app" onclick="go('form.html')"><i class="fa-solid fa-file-lines"></i><p>Form</p></div>
  <div class="app" onclick="go('calculator.html')"><i class="fa-solid fa-calculator"></i><p>Calculator</p></div>
  <div class="app" onclick="go('notes.html')"><i class="fa-solid fa-note-sticky"></i><p>Notes</p></div>
  <div class="app" onclick="go('chat.html')"><i class="fa-brands fa-whatsapp"></i><p>Chat</p></div>
</div>

<script>
function go(p){window.location=p;}

setInterval(()=>{
 let d=new Date();
 time.innerHTML=d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
},1000);
</script>

</body>

  background:#00eaff;

<body>

<div class="phone">

<div class="time" id="time"></div>

<div class="apps">
  <div class="app" onclick="go('form.html')">📄 Form</div>
  <div class="app" onclick="go('calculator.html')">🧮 Calc</div>
  <div class="app" onclick="go('notes.html')">📝 Notes</div>
  <div class="app" onclick="go('chat.html')">💬 Chat</div>
</div>

</div>

<script>
function updateTime(){
  let d=new Date();
  let h=d.getHours();
  let m=d.getMinutes();
  if(m<10)m="0"+m;
  document.getElementById("time").innerHTML=h+":"+m;
}
setInterval(updateTime,1000);
updateTime();

function go(p){
  window.location=p;
}
</script>

</body>
