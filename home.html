<!DOCTYPE html>
<html>
<head>
<title>Home</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:black;
  color:#00eaff;
}

.phone {
  height:100vh;
  padding:20px;
}

.time {
  font-size:50px;
  text-shadow:0 0 20px #00eaff;
}

.apps {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-top:50px;
}

.app {
  padding:20px;
  border:1px solid #00eaff;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  box-shadow:0 0 15px #00eaff;
}

.app:hover {
  background:#00eaff;
  color:black;
}
</style>

</head>

<body>

<div class="phone">

<div class="time" id="time"></div>

<div class="apps">
  <div class="app" onclick="go('form.html')">📄 Form</div>
  <div class="app" onclick="go('calculator.html')">🧮 Calc</div>
  <div class="app" onclick="go('notes.html')">📝 Notes</div>
  <div class="app" onclick="go('chat.html')">💬 Chat</div>
</div>

</div>

<script>
function updateTime(){
  let d=new Date();
  let h=d.getHours();
  let m=d.getMinutes();
  if(m<10)m="0"+m;
  document.getElementById("time").innerHTML=h+":"+m;
}
setInterval(updateTime,1000);
updateTime();

function go(p){
  window.location=p;
}
</script>

</body>
</html>
