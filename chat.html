<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<style>
body {
  background:black;
  color:#00eaff;
  font-family:Arial;
}

#chat {
  height:400px;
  overflow:auto;
  border:1px solid #00eaff;
  margin:10px;
  padding:10px;
  box-shadow:0 0 10px #00eaff;
}

input {
  width:70%;
  padding:10px;
  background:black;
  border:1px solid #00eaff;
  color:#00eaff;
}

button {
  padding:10px;
  background:black;
  border:1px solid #00eaff;
  color:#00eaff;
}
</style>

</head>

<body>

<h2>WhatsApp AI</h2>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script>
function send(){
 let m=msg.value;
 chat.innerHTML+="<p>You: "+m+"</p>";

 let r="I am AI";

 if(m.includes("hi")) r="Hello!";
 else if(m.includes("name")) r="Sanchith AI";
 else if(m.includes("how")) r="I am good!";

 chat.innerHTML+="<p>AI: "+r+"</p>";
 msg.value="";
}
</script>

</body>
</html>
