<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:black;color:#00eaff;font-family:Arial;}
#chat{height:350px;overflow:auto;border:1px solid #00eaff;margin:10px;padding:10px;}
input{width:70%;padding:10px;background:black;border:1px solid #00eaff;color:#00eaff;}
button{padding:10px;background:black;border:1px solid #00eaff;color:#00eaff;}
</style>
</head>

<body>

<button onclick="go()">⬅ Back</button>

<h2>Chat AI</h2>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script>
function go(){window.location="home.html";}

function send(){
 let m=msg.value.toLowerCase();
 if(!m) return;

 chat.innerHTML+="<p>You: "+m+"</p>";

 let r="I am Sanchith AI 🤖";

 if(m.includes("hi")) r="Hello 👋";
 else if(m.includes("time")) r=new Date().toLocaleTimeString();
 else if(m.match(/[0-9+\-*/]/)){
   try{r=eval(m);}catch{r="Error";}
 }
 else if(m.includes("name")) r="Sanchith AI";

 chat.innerHTML+="<p>AI: "+r+"</p>";
 chat.scrollTop=chat.scrollHeight;
 msg.value="";
}
</script>

</body>
</html>
</head>

<body>

<h2>WhatsApp AI</h2>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script>
function send(){
 let m=msg.value;
 chat.innerHTML+="<p>You: "+m+"</p>";

 let r="I am AI";

 if(m.includes("hi")) r="Hello!";
 else if(m.includes("name")) r="Sanchith AI";
 else if(m.includes("how")) r="I am good!";

 chat.innerHTML+="<p>AI: "+r+"</p>";
 msg.value="";
}
</script>

</body>
</html>
